name: Проверка графика экзаменов

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - name: Run checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python check.py
